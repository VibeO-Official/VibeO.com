<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VibeO</title>

<style>
/* ===== ТВОЙ CSS НЕ ТРОГАЛ — ОН ОК ===== */
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:Arial;background:#0a0a0a;color:#fff}

/* AUTH */
#auth-screen{display:flex;align-items:center;justify-content:center;height:100vh}
.box{background:#111;padding:30px;border-radius:12px;width:320px}
input{width:100%;padding:10px;margin:6px 0;background:#1a1a1a;border:1px solid #333;color:#fff}
button{width:100%;padding:10px;background:#7c3aed;border:none;color:#fff;margin-top:10px;cursor:pointer}
button:hover{background:#9f5ff0}

/* APP */
#app{display:none;padding:20px}
</style>
</head>

<body>

<!-- AUTH -->
<div id="auth-screen">
  <div class="box">
    <h2>VibeO</h2>

    <input id="nick" placeholder="Никнейм">
    <input id="pass" type="password" placeholder="Пароль">

    <button onclick="register()">Регистрация</button>
    <button onclick="login()">Войти</button>

    <p id="error" style="color:red;font-size:12px"></p>
  </div>
</div>

<!-- APP -->
<div id="app">
  <h3 id="user"></h3>
  <button onclick="logout()">Выйти</button>

  <input id="postText" placeholder="Пост">
  <button onclick="addPost()">Опубликовать</button>

  <div id="feed"></div>
</div>

<script>

/* =========================
   🔥 FIX: SAFE BOOT SYSTEM
========================= */

let currentUser = null;

function safe(id){
  return document.getElementById(id);
}

/* =========================
   DB
========================= */
function getUsers(){
  return JSON.parse(localStorage.getItem("users") || "[]");
}
function setUsers(u){
  localStorage.setItem("users", JSON.stringify(u));
}
function getPosts(){
  return JSON.parse(localStorage.getItem("posts") || "[]");
}
function setPosts(p){
  localStorage.setItem("posts", JSON.stringify(p));
}

/* =========================
   REGISTER
========================= */
function register(){
  const nick = safe("nick")?.value?.trim();
  const pass = safe("pass")?.value?.trim();

  if(!nick || !pass){
    return showError("Заполни все поля");
  }

  let users = getUsers();

  if(users.find(u => u.nick === nick)){
    return showError("Ник занят");
  }

  users.push({nick, pass});
  setUsers(users);

  login();
}

/* =========================
   LOGIN
========================= */
function login(){
  const nick = safe("nick")?.value?.trim();
  const pass = safe("pass")?.value?.trim();

  let user = getUsers().find(u => u.nick === nick && u.pass === pass);

  if(!user){
    return showError("Неверный логин");
  }

  currentUser = user;

  const auth = safe("auth-screen");
  const app = safe("app");

  if(!auth || !app) return;

  auth.style.display = "none";
  app.style.display = "block";

  safe("user").innerText = "@" + user.nick;

  render();
}

/* =========================
   LOGOUT
========================= */
function logout(){
  currentUser = null;
  safe("auth-screen").style.display = "flex";
  safe("app").style.display = "none";
}

/* =========================
   POSTS
========================= */
function addPost(){
  if(!currentUser) return;

  const text = safe("postText").value.trim();
  if(!text) return;

  let posts = getPosts();

  posts.unshift({
    user: currentUser.nick,
    text,
    time: Date.now()
  });

  setPosts(posts);

  safe("postText").value = "";
  render();
}

/* =========================
   RENDER
========================= */
function render(){
  let posts = getPosts();

  safe("feed").innerHTML = posts.map(p => `
    <div style="background:#111;padding:10px;margin:10px 0;border-radius:10px">
      <b>@${p.user}</b>
      <div>${p.text}</div>
      <small>${new Date(p.time).toLocaleString()}</small>
    </div>
  `).join("");
}

/* =========================
   ERROR SAFE
========================= */
function showError(msg){
  const el = safe("error");
  if(el) el.innerText = msg;
}

/* =========================
   🔥 FIX BOOTSTRAP
========================= */
document.addEventListener("DOMContentLoaded", () => {
  const auth = safe("auth-screen");
  const app = safe("app");

  if(!auth || !app){
    console.error("DOM missing");
    return;
  }

  auth.style.display = "flex";
  app.style.display = "none";
});

</script>

</body>
</html>
