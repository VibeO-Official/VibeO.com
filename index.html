<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>VibeO — Глобальная Социальная Сеть</title>
    <style>
        @keyframes gBg {0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
        body { font-family: Arial, sans-serif; background: linear-gradient(-45deg, #0f172a, #1e1b4b, #2e1065, #0f172a); background-size: 400% 400%; animation: gBg 15s ease infinite; color: #fff; margin:0; padding:0; overflow:hidden; }
        .wrapper { display: flex; justify-content: space-between; max-width: 1200px; margin: 0 auto; height: 100vh; }
        .sidebar-left { width: 250px; padding: 30px 20px; border-right: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; }
        .logo { font-size: 36px; font-weight: 900; background: linear-gradient(135deg, #00f2fe, #4facfe); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 5px; }
        .user-badge { font-size: 14px; color: #00f2fe; font-weight: bold; margin-bottom: 25px; background: rgba(0,242,254,0.1); padding: 5px 10px; border-radius: 8px; display: inline-block; align-self: flex-start; }
        .menu-link { display: block; color: #a5b4fc; text-decoration: none; padding: 14px; font-size: 18px; font-weight: bold; border-radius: 12px; margin-bottom: 5px; cursor: pointer; }
        .menu-link:hover, .menu-link.active { color: #00f2fe; background: rgba(0,242,254,0.1); }
        .feed { width: 600px; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; justify-content: center; height: 100vh; }
        .shorts-card { background: rgba(0,0,0,0.4); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 35px 25px; text-align: center; }
        .video-box { height: 320px; background: radial-gradient(circle, #252836 0%, #000000 100%); display: flex; justify-content: center; align-items: center; font-size: 80px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); }
        h2 { font-size: 22px; margin: 20px 0 5px; color: #ffffff; }
        .author { color: #00f2fe; font-size: 14px; font-weight: bold; margin-bottom: 15px; }
        .btn-like { background: rgba(255,255,255,0.05); color: white; padding: 12px 25px; font-weight: bold; border-radius: 30px; margin-top: 10px; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; }
        .btn-like:hover { color: #ff4757; border-color: #ff4757; }
        .btn-like.liked { background: #ff4757; color: white; border-color: #ff4757; }
        .search-container { display: none; margin-top: 20px; gap: 10px; justify-content: center; width: 100%; }
        .search-input { width: 70%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; padding: 12px 15px; color: white; font-size: 16px; outline: none; }
        .search-btn { background: linear-gradient(135deg, #00f2fe, #4facfe); color: #0d131a; border: none; padding: 0 20px; font-weight: bold; border-radius: 14px; cursor: pointer; }
        .messenger-box { display: none; background: rgba(0,0,0,0.5); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; height: 70vh; flex-direction: column; overflow: hidden; text-align: left; }
        .chat-header-container { padding: 15px 20px; background: rgba(255,255,255,0.03); border-bottom: 1px solid rgba(255,255,255,0.08); display: flex; flex-direction: column; gap: 10px; }
        .chat-header-title { font-weight: bold; color: #00f2fe; font-size: 16px; }
        .user-search-box { display: flex; gap: 8px; width: 100%; }
        .user-search-input { flex: 1; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; padding: 8px 12px; color: white; font-size: 13px; outline: none; }
        .user-search-btn { background: rgba(0, 242, 254, 0.2); border: 1px solid #00f2fe; color: #00f2fe; border-radius: 10px; padding: 0 15px; cursor: pointer; font-size: 12px; font-weight: bold; }
        .chat-body { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .msg-received { background: rgba(255,255,255,0.08); padding: 12px 16px; border-radius: 16px 16px 16px 0; max-width: 75%; align-self: flex-start; font-size: 15px; }
        .msg-sent { background: linear-gradient(135deg, #00f2fe, #4facfe); color: #0d131a; padding: 12px 16px; border-radius: 16px 16px 0 16px; max-width: 75%; align-self: flex-end; font-weight: bold; font-size: 15px; }
        .chat-footer { display: flex; padding: 15px; background: rgba(0,0,0,0.3); border-top: 1px solid rgba(255,255,255,0.08); gap: 10px; }
        .chat-input { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; padding: 12px 15px; color: white; outline: none; }
        .btn-send { background: #00f2fe; color: #000; border: none; padding: 0 22px; font-weight: bold; border-radius: 14px; cursor: pointer; }
        .sidebar-right { width: 280px; padding: 30px 20px; border-left: 1px solid rgba(255,255,255,0.05); }
        .trend-box { background: rgba(0,0,0,0.3); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); padding: 20px; border-radius: 16px; }
        .trend-title { color: #00f2fe; font-size: 16px; font-weight: bold; margin-bottom: 15px; }
        .trend-item { margin-bottom: 15px; }
        .trend-name { font-weight: bold; color: #fff; }
        .trend-count { font-size: 12px; color: #718096; margin-top: 2px; }
        .reg-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(11,14,20,0.9); backdrop-filter: blur(20px); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .reg-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 40px; width: 100%; max-width: 360px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        .reg-card h3 { font-size: 26px; margin: 0 0 10px 0; background: linear-gradient(135deg, #00f2fe, #4facfe); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .reg-card p { color: #8e9297; font-size: 14px; margin-bottom: 25px; }
        .reg-field { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 12px; color: white; font-size: 15px; margin-bottom: 15px; box-sizing: border-box; outline: none; }
        .reg-field:focus { border-color: #00f2fe; }
        .reg-btn { width: 100%; background: linear-gradient(135deg, #00f2fe, #4facfe); color: #0d131a; border: none; padding: 14px; font-weight: bold; border-radius: 12px; cursor: pointer; font-size: 16px; margin-top: 10px; }
    </style>
</head>
<body>
    <div id="regScreen" class="reg-overlay">
        <div class="reg-card">
            <h3>Регистрация в VibeO</h3>
            <p>Создайте всемирный аккаунт</p>
            <input type="email" id="regEmail" class="reg-field" placeholder="Ваш G-mail">
            <input type="text" id="regNick" class="reg-field" placeholder="Придумайте Никнейм">
            <input type="text" id="regPhone" class="reg-field" placeholder="Номер телефона">
            <button class="reg-btn" onclick="accountRegister()">Создать аккаунт</button>
        </div>
    </div>
    <div class="wrapper">
        <div class="sidebar-left">
            <div class="logo">VibeO</div>
            <div id="uBadge" class="user-badge">@гость</div>
            <div id="m1" class="menu-link active" onclick="sm('m1')">🏠 Главная</div>
            <div id="m2" class="menu-link" onclick="sm('m2')">🔍 Поиск</div>
            <div id="m3" class="menu-link" onclick="sm('m3')">💬 Чаты</div>
        </div>
        <div class="main-content feed">
            <div id="shortsBlock" class="shorts-card">
                <div id="videoBox" class="video-box">🎬</div>
                <h2 id="vTitle">Первый ролик в VibeO</h2>
                <div id="aBox" class="author">@world_vibe</div>
                <button id="likeBtn" class="btn-like" onclick="tl()">
                    <span id="lH">🤍</span> <span id="lT">Поставить лайк</span> (<span id="lC">4820</span>)
                </button>
            </div>
            <div id="sBar" class="search-container">
                <input type="text" id="sInput" class="search-input" placeholder="Поиск шортсов...">
                <button class="search-btn" onclick="stS()">Найти</button>
            </div>
            <div id="mBox" class="messenger-box">
                <div class="chat-header-container">
                    <div class="chat-header-title">Глобальный чат VibeO</div>
                    <div class="user-search-box">
                        <input type="text" id="uSearchInput" class="user-search-input" placeholder="Поиск собеседника...">
                        <button class="user-search-btn" onclick="searchUser()">Найти</button>
                    </div>
                </div>
                <div id="cBody" class="chat-body">
                    <div class="msg-received">Привет! Добро пожаловать в тестовую сеть VibeO! 👋</div>
                </div>
                <div class="chat-footer">
                    <input type="text" id="cInput" class="chat-input" placeholder="Напишите сообщение...">
                    <button class="btn-send" onclick="sendMsg()">Отправить</button>
                </div>
            </div>
        </div>
        <div class="sidebar-right">
            <div class="trend-box">
                <div class="trend-title">Популярное сейчас</div>
                <div class="trend-item"><div class="trend-name">#VibeO_Launch</div><div class="trend-count">124K кликов</div></div>
                <div class="trend-item"><div class="trend-name">#GlobalNetwork</div><div class="trend-count">89K кликов</div></div>
