<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VibeO</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #fafafa;
}

/* TOP BAR */
.header {
  position: fixed;
  top: 0;
  width: 100%;
  height: 50px;
  background: white;
  border-bottom: 1px solid #ddd;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
}

/* STORIES */
.stories {
  margin-top: 60px;
  display: flex;
  overflow-x: auto;
  padding: 10px;
  background: white;
  border-bottom: 1px solid #ddd;
}

.story {
  min-width: 60px;
  height: 60px;
  border-radius: 50%;
  border: 2px solid #ff4d6d;
  margin-right: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  background: #eee;
}

/* POSTS */
.feed {
  padding: 10px;
}

.post {
  background: white;
  border: 1px solid #ddd;
  margin-bottom: 15px;
  border-radius: 10px;
  overflow: hidden;
}

.post-header {
  display: flex;
  align-items: center;
  padding: 10px;
  font-weight: bold;
}

.post-img {
  width: 100%;
  height: 250px;
  object-fit: cover;
  background: #ccc;
}

.post-actions {
  padding: 10px;
}

.like-btn {
  cursor: pointer;
  font-size: 18px;
}

.likes {
  margin-top: 5px;
  font-size: 14px;
}

/* ADD POST */
.add-box {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  border-top: 1px solid #ddd;
  padding: 10px;
  display: flex;
  gap: 5px;
}

.add-box input {
  flex: 1;
  padding: 8px;
}

.add-box button {
  padding: 8px 12px;
}
</style>
</head>

<body>

<div class="header">VibeO</div>

<div class="stories" id="stories"></div>

<div class="feed" id="feed"></div>

<div class="add-box">
  <input id="imgUrl" placeholder="URL картинки..." />
  <button onclick="addPost()">Post</button>
</div>

<script>
let posts = JSON.parse(localStorage.getItem("vibeo_posts")) || [
  {user:"Alex", img:"https://picsum.photos/400/300?1", likes:0},
  {user:"Mira", img:"https://picsum.photos/400/300?2", likes:0}
];

let stories = ["You","Anna","John","Max","Lina"];

function save(){
  localStorage.setItem("vibeo_posts", JSON.stringify(posts));
}

function renderStories(){
  const el = document.getElementById("stories");
  el.innerHTML = "";
  stories.forEach(s=>{
    el.innerHTML += `<div class="story">${s}</div>`;
  });
}

function render(){
  const feed = document.getElementById("feed");
  feed.innerHTML = "";

  posts.forEach((p,i)=>{
    feed.innerHTML += `
      <div class="post">
        <div class="post-header">${p.user}</div>
        <img class="post-img" src="${p.img}">
        <div class="post-actions">
          <span class="like-btn" onclick="like(${i})">❤️</span>
          <div class="likes">${p.likes} likes</div>
        </div>
      </div>
    `;
  });
}

function like(i){
  posts[i].likes++;
  save();
  render();
}

function addPost(){
  const url = document.getElementById("imgUrl").value;
  if(!url) return;

  posts.unshift({
    user:"You",
    img:url,
    likes:0
  });

  document.getElementById("imgUrl").value = "";
  save();
  render();
}

renderStories();
render();
</script>

</body>
</html>
