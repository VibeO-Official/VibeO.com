<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VibeO MAX ULTRA</title>

<style>
body{
  margin:0;
  background:black;
  color:white;
  overflow:hidden;
  font-family:Arial;
}

#app{
  height:100vh;
  width:100vw;
  position:relative;
}

/* ===== POST ===== */
.post{
  height:100vh;
  width:100vw;
  display:none;
  position:absolute;
  top:0; left:0;
}

.post.active{display:block;}

video{
  width:100%;
  height:100%;
  object-fit:cover;
  position:absolute;
  top:0; left:0;
  z-index:-2;
}

.overlay{
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.35);
  z-index:-1;
}

/* ===== UI ===== */
.info{
  position:absolute;
  bottom:120px;
  left:15px;
}

.user{
  font-size:14px;
  opacity:0.9;
}

.title{
  font-size:24px;
  font-weight:bold;
}

.stats{
  font-size:12px;
  opacity:0.7;
  margin-top:5px;
}

/* right panel */
.right{
  position:absolute;
  right:15px;
  bottom:120px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.btn{
  width:52px;
  height:52px;
  border-radius:50%;
  border:none;
  cursor:pointer;
  background:rgba(255,255,255,0.15);
  color:white;
  font-size:18px;
}

/* top bar */
.top{
  position:absolute;
  top:10px;
  left:10px;
  right:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

input{
  width:55%;
  padding:8px;
  border-radius:8px;
  border:none;
}

/* upload */
.upload{
  position:absolute;
  bottom:20px;
  left:15px;
  background:white;
  color:black;
  padding:10px;
  border-radius:10px;
  cursor:pointer;
}

/* heart animation */
.heart{
  position:absolute;
  font-size:30px;
  animation:float 1s forwards;
}

@keyframes float{
  0%{transform:translateY(0);opacity:1;}
  100%{transform:translateY(-150px);opacity:0;}
}
</style>
</head>

<body>

<div id="app"></div>

<div class="top">
  <div>🔥 VibeO MAX</div>
  <input id="search" placeholder="поиск..." oninput="render()"/>
</div>

<div class="right">
  <button class="btn" onclick="like()">❤️</button>
  <button class="btn" onclick="follow()">➕</button>
  <button class="btn" onclick="bookmark()">🔖</button>
</div>

<div class="upload">
  <input type="file" accept="video/*" onchange="uploadVideo(event)">
</div>

<script>
/* ===== DATA ===== */
let posts = JSON.parse(localStorage.getItem("vibeo_max") || "null") || [
  {
    user:"@neo",
    title:"Welcome to VibeO",
    video:"https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4",
    likes:0,
    views:0,
    followers:0,
    bookmarked:false
  },
  {
    user:"@alpha",
    title:"Level MAX",
    video:"https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4",
    likes:0,
    views:0,
    followers:0,
    bookmarked:false
  }
];

let index = 0;

/* ===== SAVE ===== */
function save(){
  localStorage.setItem("vibeo_max", JSON.stringify(posts));
}

/* ===== SEARCH FILTER ===== */
function getFiltered(){
  let q = document.getElementById("search").value.toLowerCase();
  return posts.filter(p =>
    p.title.toLowerCase().includes(q) ||
    p.user.toLowerCase().includes(q)
  );
}

/* ===== RENDER ===== */
const app = document.getElementById("app");

function render(){
  app.innerHTML = "";

  let list = getFiltered();

  list.forEach((p,i)=>{
    let div = document.createElement("div");
    div.className = "post" + (i===index ? " active":"");

    div.innerHTML = `
      <video autoplay muted loop>
        <source src="${p.video}">
      </video>
      <div class="overlay"></div>

      <div class="info">
        <div class="user">${p.user}</div>
        <div class="title">${p.title}</div>
        <div class="stats">❤️ ${p.likes} | 👁 ${p.views} | 👥 ${p.followers}</div>
      </div>
    `;

    app.appendChild(div);
  });

  playVideo();
  addView(list);
  save();
}

/* ===== VIDEO ===== */
function playVideo(){
  document.querySelectorAll("video").forEach(v=>v.pause());
  let v = document.querySelector(".post.active video");
  if(v) v.play();
}

/* ===== NAV ===== */
function next(){
  index++;
  if(index>=posts.length) index=0;
  render();
}

function prev(){
  index--;
  if(index<0) index=posts.length-1;
  render();
}

/* ===== LIKE ===== */
function like(){
  posts[index].likes++;
  spawnHeart();
  save();
  render();
}

function spawnHeart(){
  let h=document.createElement("div");
  h.className="heart";
  h.innerText="❤️";
  h.style.left=Math.random()*80+"%";
  h.style.top="60%";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),1000);
}

/* ===== FOLLOW ===== */
function follow(){
  posts[index].followers++;
  alert("➕ подписка добавлена");
  save();
  render();
}

/* ===== BOOKMARK ===== */
function bookmark(){
  posts[index].bookmarked = !posts[index].bookmarked;
  alert(posts[index].bookmarked ? "🔖 сохранено" : "❌ убрано");
  save();
  render();
}

/* ===== VIEWS ===== */
function addView(list){
  let p = list[index];
  if(p) p.views++;
}

/* ===== UPLOAD VIDEO (OFFLINE) ===== */
function uploadVideo(e){
  let file = e.target.files[0];
  if(!file) return;

  let url = URL.createObjectURL(file);

  posts.unshift({
    user:"@you",
    title:file.name,
    video:url,
    likes:0,
    views:0,
    followers:0,
    bookmarked:false
  });

  index = 0;
  save();
  render();
}

/* ===== SWIPE ===== */
let startY=0;

document.addEventListener("touchstart",e=>{
  startY=e.touches[0].clientY;
});

document.addEventListener("touchend",e=>{
  let endY=e.changedTouches[0].clientY;

  if(startY-endY>50) next();
  if(endY-startY>50) prev();
});

/* ===== WHEEL ===== */
document.addEventListener("wheel",e=>{
  if(e.deltaY>0) next();
  else prev();
});

/* ===== KEYBOARD (MAX feature) ===== */
document.addEventListener("keydown",e=>{
  if(e.key==="ArrowDown") next();
  if(e.key==="ArrowUp") prev();
  if(e.key===" "){ like(); }
});

/* ===== INIT ===== */
render();
</script>

</body>
</html>
