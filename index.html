<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram clone — VibeO</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #000;
            color: #fff;
            overflow-x: hidden;
        }

        .main-container {
            display: flex;
            max-width: 1250px;
            margin: 0 auto;
            min-height: 100vh;
        }

        .sidebar {
            width: 245px;
            padding: 25px 12px;
            border-right: 1px solid #262626;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            font-style: italic;
            font-family: 'Courier New', Courier, monospace;
            margin-bottom: 35px;
            padding-left: 12px;
            background: linear-gradient(
                45deg,
                #f09433 0%,
                #e6683c 25%,
                #dc2743 50%,
                #cc2366 75%,
                #bc1888 100%
            );
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-menu {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex-grow: 1;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px;
            font-size: 16px;
            font-weight: 500;
            border-radius: 8px;
            cursor: pointer;
            color: #f5f5f5;
            text-decoration: none;
            transition: background 0.2s;
        }

        .nav-item:hover,
        .nav-item.active {
            background-color: #1a1a1a;
            color: #fff;
            font-weight: 700;
        }

        .nav-item .icon {
            font-size: 22px;
            width: 24px;
            text-align: center;
        }

        .auth-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .auth-box {
            background-color: #000;
            border: 1px solid #262626;
            padding: 40px;
            width: 100%;
            max-width: 350px;
            text-align: center;
        }

        .auth-logo {
            font-size: 32px;
            font-weight: bold;
            font-style: italic;
            margin-bottom: 24px;
            font-family: 'Courier New', Courier, monospace;
        }

        .auth-text {
            color: #737373;
            font-weight: 600;
            font-size: 16px;
            line-height: 20px;
            margin-bottom: 20px;
        }

        .auth-input {
            width: 100%;
            background: #121212;
            border: 1px solid #363636;
            border-radius: 3px;
            padding: 9px 12px;
            color: #fff;
            font-size: 12px;
            margin-bottom: 8px;
            outline: none;
        }

        .auth-input:focus {
            border-color: #a8a8a8;
        }

        .auth-btn {
            width: 100%;
            background-color: #0095f6;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 10px 16px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.2s;
        }

        .auth-btn:hover {
            background-color: #1877f2;
        }

        .content-hidden {
            display: none;
        }

        .welcome {
            margin-left: 260px;
            padding: 40px;
            font-size: 24px;
        }
    </style>
</head>
<body>

    <!-- Экран регистрации -->
    <div id="authScreen" class="auth-overlay">
        <div class="auth-box">
            <div class="auth-logo">VibeO</div>

            <p class="auth-text">
                Зарегистрируйтесь, чтобы смотреть фото и видео ваших друзей.
            </p>

            <input
                type="email"
                id="regEmail"
                class="auth-input"
                placeholder="Моб. телефон или эл. адрес"
            >

            <input
                type="text"
                id="regNick"
                class="auth-input"
                placeholder="Имя пользователя (Никнейм)"
            >

            <input
                type="password"
                id="regPass"
                class="auth-input"
                placeholder="Пароль"
            >

            <button id="regBtn" class="auth-btn">
                Зарегистрироваться
            </button>
        </div>
    </div>

    <!-- Основной интерфейс -->
    <div id="appContent" class="content-hidden">

        <div class="main-container">

            <div class="sidebar">
                <div class="logo">VibeO</div>

                <div class="nav-menu">
                    <a class="nav-item active">
                        <span class="icon">🏠</span>
                        <span>Главная</span>
                    </a>

                    <a class="nav-item">
                        <span class="icon">🔍</span>
                        <span>Поиск</span>
                    </a>
                </div>
            </div>

            <div id="welcomeText" class="welcome">
                Добро пожаловать!
            </div>

        </div>

    </div>

    <script>
        function executeRegistration() {

            const email = document
                .getElementById("regEmail")
                .value
                .trim();

            const nickname = document
                .getElementById("regNick")
                .value
                .trim();

            const password = document
                .getElementById("regPass")
                .value
                .trim();

            if (!email || !nickname || !password) {
                alert("Пожалуйста, заполните все поля!");
                return;
            }

            if (!email.includes("@")) {
                alert("Введите корректный email!");
                return;
            }

            document.getElementById("authScreen").style.display = "none";

            document
                .getElementById("appContent")
                .classList
                .remove("content-hidden");

            document.getElementById(
                "welcomeText"
            ).textContent =
                `Добро пожаловать, ${nickname}!`;

            console.log("Пользователь зарегистрирован:", {
                email,
                nickname
            });
        }

        document.addEventListener("DOMContentLoaded", function () {

            const btn = document.getElementById("regBtn");

            btn.addEventListener(
                "click",
                executeRegistration
            );

        });
    </script>

</body>
</html>
