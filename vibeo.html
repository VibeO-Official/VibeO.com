<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram clone — VibeO</title>
    <style>
        /* Общие стили в стиле Instagram Dark Mode */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #000; color: #fff; overflow-x: hidden; }
        
        /* Главный контейнер (Сетка как в Instagram) */
        .main-container { display: flex; max-width: 1250px; margin: 0 auto; min-height: 100vh; }
        
        /* ЛЕВАЯ ПАНЕЛЬ НАВИГАЦИИ (Instagram Sidebar) */
        .sidebar { width: 245px; padding: 25px 12px; border-right: 1px solid #262626; display: flex; flex-direction: column; position: fixed; height: 100vh; }
        .logo { font-size: 24px; font-weight: bold; font-style: italic; font-family: 'Courier New', Courier, monospace; margin-bottom: 35px; padding-left: 12px; background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav-menu { display: flex; flex-direction: column; gap: 8px; flex-grow: 1; }
        .nav-item { display: flex; align-items: center; gap: 16px; padding: 12px; font-size: 16px; font-weight: 500; border-radius: 8px; cursor: pointer; color: #f5f5f5; text-decoration: none; transition: background 0.2s; }
        .nav-item:hover, .nav-item.active { background-color: #1a1a1a; color: #fff; font-weight: 700; }
        .nav-item .icon { font-size: 22px; width: 24px; text-align: center; }
        .profile-badge { font-size: 12px; background: #0095f6; color: #fff; padding: 2px 8px; border-radius: 10px; font-weight: bold; max-width: fit-content; margin-top: 5px; }

        /* ЦЕНТРАЛЬНЫЙ БЛОК (Лента и Сторис) */
        .content-area { margin-left: 245px; width: 630px; padding: 24px 40px; display: flex; flex-direction: column; align-items: center; }
        
        /* Блок Историй (Stories) */
        .stories-container { display: flex; gap: 16px; width: 100%; max-width: 470px; overflow-x: auto; padding: 10px 0 20px 0; margin-bottom: 20px; border-bottom: 1px solid #121212; scrollbar-width: none; }
        .story-item { display: flex; flex-direction: column; align-items: center; font-size: 12px; color: #a8a8a8; cursor: pointer; min-width: 66px; }
        .story-avatar-ring { width: 62px; height: 62px; border-radius: 50%; background: linear-gradient(45deg, #f09433, #dc2743, #bc1888); display: flex; justify-content: center; align-items: center; margin-bottom: 6px; }
        .story-avatar { width: 56px; height: 56px; border-radius: 50%; background-color: #262626; display: flex; justify-content: center; align-items: center; font-size: 24px; border: 2px solid #000; }
        .story-name { width: 66px; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* Лента постов (Feed) */
        .feed-container { display: flex; flex-direction: column; gap: 24px; width: 100%; max-width: 470px; }
        .post-card { border-bottom: 1px solid #262626; padding-bottom: 20px; display: flex; flex-direction: column; }
        .post-header { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; }
        .post-author { display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 600; cursor: pointer; }
        .post-author-avatar { width: 32px; height: 32px; border-radius: 50%; background: #262626; display: flex; justify-content: center; align-items: center; font-size: 14px; border: 1px solid #363636; }
        .post-time { color: #a8a8a8; font-weight: 400; font-size: 14px; margin-left: 4px; }
        .post-time::before { content: "• "; }
        .post-options { cursor: pointer; color: #a8a8a8; }
        
        /* Тело поста (Картинка/Контент) */
        .post-image-box { width: 100%; height: 470px; background: linear-gradient(135deg, #121212 0%, #262626 100%); border-radius: 4px; border: 1px solid #262626; display: flex; justify-content: center; align-items: center; font-size: 64px; position: relative; }
        
        /* Кнопки взаимодействия под постом */
        .post-actions { display: flex; justify-content: space-between; padding: 12px 0 8px 0; }
        .post-actions-left { display: flex; gap: 16px; }
        .action-icon { font-size: 24px; cursor: pointer; transition: transform 0.1s; }
        .action-icon:hover { transform: scale(1.1); }
        .action-icon.liked { color: #ff3040; }
        
        /* Текстовая информация поста */
        .post-info { display: flex; flex-direction: column; gap: 6px; font-size: 14px; }
        .likes-count { font-weight: 600; }
        .post-caption { line-height: 18px; }
        .post-caption .username { font-weight: 600; margin-right: 6px; cursor: pointer; }
        .comments-link { color: #a8a8a8; cursor: pointer; margin-top: 4px; }

        /* ПРАВАЯ ПАНЕЛЬ (Рекомендации / Suggestions) */
        .right-sidebar { width: 320px; padding: 40px 0 0 24px; display: block; }
        @media (max-width: 1000px) { .right-sidebar { display: none; } }
        .suggestions-header { display: flex; justify-content: space-between; font-size: 14px; font-weight: 600; color: #a8a8a8; margin-bottom: 16px; }
        .suggestion-item { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
        .suggestion-user { display: flex; align-items: center; gap: 12px; font-size: 14px; }
        .suggestion-btn { color: #0095f6; font-size: 12px; font-weight: 600; cursor: pointer; background: none; border: none; }
        .suggestion-btn:hover { color: #fff; }

        /* ОКНО РЕГИСТРАЦИИ (Instagram Auth Layout) */
        .auth-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #000; display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .auth-box { background-color: #000; border: 1px solid #262626; padding: 40px; width: 100%; max-width: 350px; text-align: center; border-radius: 1px; }
        .auth-logo { font-size: 32px; font-weight: bold; font-style: italic; margin-bottom: 24px; font-family: 'Courier New', Courier, monospace; }
        .auth-text { color: #737373; font-weight: 600; font-size: 16px; line-height: 20px; margin-bottom: 20px; }
        .auth-input { width: 100%; background: #121212; border: 1px solid #363636; border-radius: 3px; padding: 9px 12px; color: #fff; font-size: 12px; margin-bottom: 8px; outline: none; }
        .auth-input:focus { border-color: #a8a8a8; }
        .auth-btn { width: 100%; background-color: #0095f6; color: #fff; border: none; border-radius: 8px; padding: 7px 16px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 8px; transition: background 0.2s; }
        .auth-btn:hover { background-color: #1877f2; }
        .auth-btn:disabled { background-color: #002d4a; color: #8cb6d4; cursor: not-allowed; }
    </style>
</head>
<body>

    <!-- МОДАЛЬНОЕ ОКНО РЕГИСТРАЦИИ (Блокирует сайт до ввода данных) -->
    <div id="authScreen" class="auth-overlay">
        <div class="auth-box">
            <div class="auth-logo">VibeO</div>
            <p class="auth-text">Зарегистрируйтесь, чтобы смотреть фото и видео ваших друзей.</p>
            <input type="email" id="regEmail" class="auth-input" placeholder="Моб. телефон или эл. адрес">
            <input type="text" id="regNick" class="auth-input" placeholder="Имя пользователя (Никнейм)">
            <input type="password" id="regPass" class="auth-input" placeholder="Пароль">
            <!-- КНОПКА ГАРАНТИРОВАННО СРАБОТАЕТ ПРИ КЛИКЕ -->
            <button id="regBtn" class="auth-btn" onclick="executeRegistration()">Зарегистрироваться</button>
        </div>
    </div>

    <!-- ГЛАВНЫЙ ИНТЕРФЕЙС ПРИЛОЖЕНИЯ -->
    <div class="main-container">
        
        <!-- ЛЕВОЕ МЕНЮ (INSTAGRAM SIDEBAR) -->
        <div class="sidebar">
            <div class="logo">VibeO</div>
            <div class="nav-menu">
                <a class="nav-item active" onclick="switchTab('home')"><span class="icon">🏠</span> <span>Главная</span></a>
                <a class="nav-item" onclick="switchTab('search')"><span class="icon">🔍</span> <span>Поисковый запрос</span></a>
                <a class="nav-item" onclick="switchTab('messages')"><span class="icon">💬</span> <span>Сообщения</span></a>
                <a class="nav-item" onclick="switchTab('notify')"><span class="icon">❤️</span> <span>Уведомления</span></a>
                <a class="nav-item" onclick="switchTab('create')"><span class="icon">➕</span> <span>Создать</span></a>
            </div>
            <div>
                <div id="userProfileBadge" class="profile-badge">@гость</div>
            </div>
        </div>

        <!-- ЦЕНТРАЛЬНАЯ ЛЕНТА -->
        <div class="content-area">
            
            <!-- БЛОК СТОРИС (STORIES) -->
            <div class="stories-container">
                <div class="story-item"><div class="story-avatar-ring"><div class="story-avatar">🐱</div></div><div class="story-name">cat_vibe</div></div>
                <div class="story-item"><div class="story-avatar-ring"><div class="story-avatar">🎮</div></div><div class="story-name">cyber_news</div></div>
                <div class="story-item"><div class="story-avatar-ring"><div class="story-avatar">🌌</div></div><div class="story-name">nasa_space</div></div>
                <div class="story-item"><div class="story-avatar-ring"><div class="story-avatar">🎵</div></div><div class="story-name">music_box</div></div>
                <div class="story-item"><div class="story-avatar-ring"><div class="story-avatar">😎</div></div><div class="story-name">dude_bro</div></div>
            </div>

            <!-- ЛЕНТА С ПОСТАМИ (FEED) -->
            <div class="feed-container">
